<?xml version="1.0" encoding="UTF-8"?>
<!--
  Weathered cottonwood plank.
  Cottonwood: pale, silvery-tan with broad, soft grain and the occasional
  darker streak. Less red than oak, more neutral than pine.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <!-- Soft grain: long, gentle horizontal streaks -->
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.006 0.7" numOctaves="2" seed="7" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.40
                             0 0 0 0 0.34
                             0 0 0 0 0.26
                             0 0 0 0.40 0"/>
    </filter>
    <!-- Broad bands — cottonwood's wider growth rings -->
    <filter id="bands" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.0025 0.10" numOctaves="2" seed="14" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.55
                             0 0 0 0 0.48
                             0 0 0 0 0.36
                             0 0 0 0.30 0"/>
    </filter>
    <!-- A faint silvery wash, the weathered look cottonwood gets outside -->
    <filter id="wash" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.012" numOctaves="2" seed="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.78
                             0 0 0 0 0.74
                             0 0 0 0 0.66
                             0 0 0 0.18 0"/>
    </filter>
    <!-- Plank seams every 280px -->
    <pattern id="planks" x="0" y="0" width="280" height="700" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="280" height="700" fill="none"/>
      <line x1="0" y1="0" x2="0" y2="700" stroke="#5a4a30" stroke-width="2" opacity="0.45"/>
      <line x1="2" y1="0" x2="2" y2="700" stroke="#e6dcc0" stroke-width="1" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- pale cottonwood base -->
  <rect width="100%" height="100%" fill="#d4c69a"/>
  <!-- silvery weathering wash -->
  <rect width="100%" height="100%" filter="url(#wash)"/>
  <!-- broad warm bands -->
  <rect width="100%" height="100%" filter="url(#bands)"/>
  <!-- fine grain streaks -->
  <rect width="100%" height="100%" filter="url(#grain)"/>
  <!-- plank seams -->
  <rect width="100%" height="100%" fill="url(#planks)"/>
</svg>
